spring.application.name=CorpusAI
server.port=8080

# DataSource - values injected from .env
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:corpusai}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# LangChain4j - OpenAI chat model
langchain4j.open-ai.chat-model.api-key=${OPENAI_API_KEY}
langchain4j.open-ai.chat-model.model-name=gpt-4o-mini
langchain4j.open-ai.chat-model.temperature=0.7
langchain4j.open-ai.chat-model.log-requests=false
langchain4j.open-ai.chat-model.log-responses=false

# LangChain4j - OpenAI embedding model (1536 dims)
langchain4j.open-ai.embedding-model.api-key=${OPENAI_API_KEY}
langchain4j.open-ai.embedding-model.model-name=text-embedding-3-small

# Actuator
management.endpoints.web.exposure.include=health,info
