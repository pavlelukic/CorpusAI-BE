spring:
  application:
    name: CorpusAI
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:corpusai}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  flyway:
    baseline-on-migrate: true
  jpa:
    hibernate:
      ddl-auto: validate
server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info