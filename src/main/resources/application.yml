spring:
  application:
    name: CorpusAI
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:corpusai}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

corpusai:
  subjects:
    - id: softverski-procesi
      display-name: "Softverski Proces"
      display-name-sr: "Софтверски процес"
      system-prompt-path: "prompts/softverski-procesi.txt"
      documents-path: "documents/softverski-procesi"
    - id: softverski-paterni
      display-name: "Softverski Paterni"
      display-name-sr: "Софтверски патерни"
      system-prompt-path: "prompts/softverski-paterni.txt"
      documents-path: "documents/softverski-paterni"
    - id: projektovanje-softvera
      display-name: "Projektovanje Softvera"
      display-name-sr: "Пројектовање софтвера"
      system-prompt-path: "prompts/projektovanje-softvera.txt"
      documents-path: "documents/projektovanje-softvera"