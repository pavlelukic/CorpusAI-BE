spring:
  application:
    name: CorpusAI
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:corpusai}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  flyway:
    baseline-on-migrate: true
  jpa:
    hibernate:
      ddl-auto: validate
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

corpusai:
  jwt:
    secret: ${JWT_SECRET}
    expiration-hours: ${JWT_EXPIRATION_HOURS:24}
  storage:
    root: ${STORAGE_ROOT:./storage/documents}